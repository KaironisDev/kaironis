services:
  kaironis-bot:
    # Update deze tag bij elke release naar de nieuwe versie (bijv. 0.4.0)
    image: kaironis-bot:0.3.0
    env_file:
      - ../.env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_OPERATOR_CHAT_ID=${TELEGRAM_OPERATOR_CHAT_ID}
      - POSTGRES_HOST=kaironis-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=kaironis
      - POSTGRES_USER=kaironis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=docker-redis-1
      - REDIS_PORT=6379
      - CHROMADB_HOST=docker-chromadb-1
      - CHROMADB_PORT=8000
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_PORT=11434
      - ENVIRONMENT=sandbox
      - LOG_LEVEL=DEBUG
    networks:
      - app-net
      - docker_default
    restart: unless-stopped
    volumes:
      - ../logs:/app/logs

networks:
  app-net:
    external: true
  docker_default:
    external: true
