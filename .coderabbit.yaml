language: "en"

# Project context for CodeRabbit reviews.
# Kaironis is an autonomous AI trading system built for an experienced trader (Perry) in the Netherlands.
#
# What Kaironis does:
# - Trades based on the TCT (Time-Cycle Trading) strategy.
# - Goal: 10%+ monthly return on Breakout Prop funded accounts.
#
# Architecture:
# - Telegram bot as operator interface (@KaironisBot prod, @Kaironis_test_bot sandbox)
# - ChromaDB knowledge base, Ollama embeddings, OpenRouter RAG, PostgreSQL, Redis
# - Two VPS servers: prod (<prod-vps>) and sandbox (<sandbox-vps>)
#
# Critical principles:
# - Safety above all: autonomous trading decisions must be traceable
# - Operator can always intervene: kill switch is sacred
# - No silent failures: errors cost money
# - Secrets never in code: everything via environment variables
# - Audit trail: every trading action must be logged

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  path_instructions:
    - path: "src/orchestration/**"
      instructions: |
        This is the Telegram bot interface for Kaironis, an autonomous AI trading system.
        Review from the perspective of an algo-trader and software architect:
        - Is the error handling robust enough for a trading context? Errors must never fail silently.
        - Are credentials and API keys safely shielded (never hardcoded)?
        - Is the operator-only security correctly implemented?
        - Are commands clear and usable during live trading sessions?

    - path: "src/memory/**"
      instructions: |
        This is the memory/knowledge base module of Kaironis (ChromaDB + PostgreSQL).
        Review from a data-quality and trading perspective:
        - Is the embedding logic correct? Wrong embeddings lead to bad trading decisions.
        - Is the chunking strategy meaningful for TCT strategy documents?
        - Are database operations safe (SQL injection, connection pooling)?
        - Are errors in the knowledge base query handled gracefully?

    - path: "src/trading/**"
      instructions: |
        This is the trading engine of Kaironis. Extreme care required.
        Review as a senior algo-trader + risk manager:
        - Are there hard stop-losses and position size limits implemented?
        - Can the system unintentionally open or close a position?
        - Is there audit logging for every trading action?
        - Are edge cases (no liquidity, API timeout, slippage) handled?

    - path: "src/core/**"
      instructions: |
        This is the agent loop - the brain of Kaironis.
        Review as an AI safety engineer and algo-trader:
        - Are there clear limits on autonomous decisions?
        - Can the operator always intervene (kill switch)?
        - Is the decision logic transparent and traceable?

    - path: "docker/**"
      instructions: |
        Docker configuration for production trading system.
        - Are secrets correctly passed via environment variables (never in the image)?
        - Are the health checks adequate?
        - Are the networks correctly isolated?
        - Are volumes persistent for critical data (PostgreSQL, ChromaDB)?

    - path: "tests/**"
      instructions: |
        Tests for a trading system where errors cost money.
        - Are the critical paths (trading decisions, risk checks) tested?
        - Are edge cases tested (empty knowledge base, DB down, API timeout)?
        - Are mocks realistic enough to simulate production behavior?

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

chat:
  auto_reply: true
